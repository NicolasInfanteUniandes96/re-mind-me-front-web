<article class="surface alarm-card card-hover">
  <header class="alarm-card-header">
    <p class="alarm-time">{{ time }}</p>
    <span class="priority-badge" [class.high]="priority === 'high'" [class.low]="priority === 'low'">
      {{ priorityLabel }}
    </span>
  </header>

  <h3 class="alarm-title">{{ title }}</h3>

  <p class="alarm-intention">
    <span class="caption">Intencion</span>
    {{ intention }}
  </p>

  <p class="alarm-context">
    <span class="caption">Contexto</span>
    {{ context }}
  </p>
</article>
